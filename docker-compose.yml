services:
  backend:
    build: ./backend
    env_file: .env
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - task-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  task-data:
